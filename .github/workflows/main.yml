name: Full Tunnel (ngrok)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Start mhrv-tunnel-node
        run: |
          docker run -d --name mhrv-tunnel \
            -p 8080:8080 \
            -e TUNNEL_AUTH_KEY="${{ secrets.TUNNEL_AUTH_KEY }}" \
            ghcr.io/therealaleph/mhrv-tunnel-node:latest
          sleep 5
          curl -s http://localhost:8080/health || sleep 5


      - name: Install localtunnel
        run: npm install -g localtunnel


      - name: Expose tunnel
        id: expose
        run: |
          lt --port 8080 --subdomain mrgoodsilentcode> lt.log 2>&1 &
          sleep 8

          URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.loca\.lt' lt.log | head -n1)

          echo "TUNNEL_URL=$URL" >> $GITHUB_OUTPUT
          echo "::notice::Tunnel URL: $URL"
          echo "TUNNEL_SERVER_URL = $URL"

          sleep 21000

      - name: Cleanup
        if: always()
        run: |
          docker stop mhrv-tunnel || true
          pkill ngrok || true
