name: Full Tunnel (Zrok)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Start mhrv-tunnel-node
        run: |
          docker run -d --name mhrv-tunnel \
            -p 8080:8080 \
            -e TUNNEL_AUTH_KEY="${{ secrets.TUNNEL_AUTH_KEY }}" \
            ghcr.io/therealaleph/mhrv-tunnel-node:latest
          sleep 5
          curl -s http://localhost:8080/health || sleep 5


      - name: Expose tunnel
        id: expose
        run: |
          ssh -p 443 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -R0:localhost:8080 \
            qr+tcp@free.pinggy.io
          sleep 10000

      - name: Cleanup
        if: always()
        run: |
          docker stop mhrv-tunnel || true
          pkill zrok2 || true
