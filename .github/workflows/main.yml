name: Full Tunnel (localhost.run)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Start mhrv-tunnel-node
        run: |
          docker run -d --name mhrv-tunnel \
            -p 8080:8080 \
            -e TUNNEL_AUTH_KEY="${{ secrets.TUNNEL_AUTH_KEY }}" \
            ghcr.io/therealaleph/mhrv-tunnel-node:latest
          sleep 5
          curl -s http://localhost:8080/health || sleep 5

      - name: Expose tunnel via localhost.run
        id: expose
        run: |
          # Start the localhost.run tunnel over SSH in the background and log output
          ssh -R 80:localhost:8080 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null nokey@localhost.run > tunnel.log 2>&1 &
          
          # Allow the tunnel connection to establish and receive its domain assignment
          sleep 8
          
          # Extract the assigned HTTPS URL from the log file
          URL=$(grep -oE "https://[a-zA-Z0-9.-]+\.localhost\.run" tunnel.log | head -n 1)
          
          if [ -z "$URL" ]; then
            echo "::error::Could not extract localhost.run tunnel URL. Content of logs:"
            cat tunnel.log
            exit 1
          fi

          echo "TUNNEL_URL=$URL" >> $GITHUB_OUTPUT
          echo "::notice::Tunnel URL: $URL"
          echo "TUNNEL_SERVER_URL = $URL"
          
          # Keep the runner alive for the remainder of the 6 hour job ceiling
          sleep 10000

      - name: Cleanup
        if: always()
        run: |
          docker stop mhrv-tunnel || true
          pkill ssh || true
