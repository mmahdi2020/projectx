name: Full Tunnel (Zrok)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Start mhrv-tunnel-node
        run: |
          docker run -d --name mhrv-tunnel \
            -p 8080:8080 \
            -e TUNNEL_AUTH_KEY="${{ secrets.TUNNEL_AUTH_KEY }}" \
            ghcr.io/therealaleph/mhrv-tunnel-node:latest
          sleep 5
          curl -s http://localhost:8080/health || sleep 5


      - name: Install And Enable zrok
        run: curl -sSf https://get.openziti.io/install.bash | sudo bash -s zrok2 | zrok2 enable sM4ZzRRQP32N


      - name: Expose tunnel
        id: expose
        run: |
          zrok2 share public 8080
          sleep 10000

      - name: Cleanup
        if: always()
        run: |
          docker stop mhrv-tunnel || true
          pkill zrok2 || true
