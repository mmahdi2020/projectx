name: Full Tunnel (Zrok)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Start mhrv-tunnel-node
        run: |
          docker run -d --name mhrv-tunnel \
            -p 8080:8080 \
            -e TUNNEL_AUTH_KEY="${{ secrets.TUNNEL_AUTH_KEY }}" \
            ghcr.io/therealaleph/mhrv-tunnel-node:latest
          sleep 5
          curl -s http://localhost:8080/health || sleep 5


      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools

      - name: Create and Start Tunnel
        run: |
          curl -s https://tunnel.pyjam.as/8080 -o tunnel.conf
          
          # حذف بخش DNS و تغییر در فایل کانفیگ برای جلوگیری از خرابی اینترنت رانر
          # این خط باعث می‌شود wg-quick سیستم روتینگ کل رانر را بهم نریزد
          sudo sed -i 's/DNS = .*/ /' tunnel.conf
          
          # اجرای تونل با sudo
          sudo wg-quick up ./tunnel.conf
          
          # نمایش وضعیت برای اطمینان
          sudo wg show
          
          # چاپ لینک نهایی در لاگ (برای اطمینان از صحت لینک)
          echo "Your tunnel is live at: $(grep -o 'https://[^ ]*\.pyjam\.as' tunnel.conf || echo 'Link not found')"

      - name: Wait (Keep Alive)
        # زمان اجرای پروژه را اینجا مدیریت کنید
        run: sleep 10000 

      - name: Cleanup
        if: always()
        run: |
          docker stop mhrv-tunnel || true
          wg-quick down ./tunnel.conf
